worker_processes 1;

events {}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Cap request bodies at 64 MiB. The backend enforces a tighter script
  # upload cap (SCRIPT_MAX_UPLOAD_BYTES, default 50 MiB); this stops
  # multi-GB bodies from ever hitting uvicorn.
  client_max_body_size 64m;

  # ── Security headers ────────────────────────────────────────────────────
  # Applied to every response from every location block via `always`.
  #
  # CSP: self-only by default. `'unsafe-inline'` / `'unsafe-eval'` are kept
  # for script-src because Next.js inlines hydration scripts; style-src
  # allows inline because tailwind + next/font ships inline <style> tags.
  # Media/file previews (images, HTML) are sandboxed by the frontend iframe
  # — see frontend/app/scripts/[id]/page.tsx.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "same-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  server {
    listen 80;

    # Replace any client-supplied X-Forwarded-For with the real peer IP so
    # the backend rate limiter cannot be tricked into rotating buckets.
    location /api/ {
      proxy_pass         http://127.0.0.1:8000;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Forwarded-For   $remote_addr;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }

    location /ws/ {
      proxy_pass         http://127.0.0.1:8000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Forwarded-For   $remote_addr;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s;
    }

    location / {
      proxy_pass         http://127.0.0.1:3000;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Forwarded-For   $remote_addr;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }
  }
}
