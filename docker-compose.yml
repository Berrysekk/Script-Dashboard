version: "3.9"

# ── Standard (bridge) — works out of the box ──────────────────────
services:
  dashboard:
    image: ghcr.io/berrysekk/script-dashboard:latest
    container_name: script-dashboard
    ports:
      - "7080:80"          # access at http://<ip>:7080
    volumes:
      - /mnt/user/appdata/script-dashboard:/data
    # Auth bootstrap — consumed only on first start. If you omit these, the
    # passwords are auto-generated and printed to the container logs once.
    # environment:
    #   ADMIN_USERNAME: admin
    #   ADMIN_PASSWORD: change-me
    #   MASTER_PASSWORD: pick-something-long
    restart: unless-stopped

# ── macvlan (own IP on br0) — uncomment to use instead ──────────────────────
