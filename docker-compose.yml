version: "3.9"

# ── Standard (bridge) — works out of the box on Unraid ──────────────────────
services:
  dashboard:
    image: ghcr.io/berrysekk/script-dashboard:latest
    container_name: script-dashboard
    ports:
      - "7080:80"          # access at http://<unraid-ip>:7080
    volumes:
      - /mnt/user/appdata/script-dashboard:/data
    restart: unless-stopped

